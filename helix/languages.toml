# Python configuration with Ruff
[[language]]
name = "python"
language-servers = ["pylsp"]
auto-format = true
formatter = { command = "ruff", args = ["format", "--stdin-filename", "file.py", "-"] }

[language-server.pylsp]
command = "pylsp"
# Disable formatters that conflict with Ruff
config.pylsp.plugins.autopep8.enabled = false
config.pylsp.plugins.yapf.enabled = false
config.pylsp.plugins.black.enabled = false
config.pylsp.plugins.pycodestyle.enabled = false
config.pylsp.plugins.pyflakes.enabled = false
config.pylsp.plugins.pylint.enabled = false
# Enable Ruff for linting via pylsp
config.pylsp.plugins.ruff.enabled = true
config.pylsp.plugins.ruff.lineLength = 100
# Enable MyPy for type checking (FIXED namespace)
config.pylsp.plugins.pylsp_mypy.enabled = true
config.pylsp.plugins.pylsp_mypy.live_mode = true
config.pylsp.plugins.pylsp_mypy.strict = false
# Enable Jedi for completion and intelligence
config.pylsp.plugins.jedi_completion.enabled = true
config.pylsp.plugins.jedi_hover.enabled = true
config.pylsp.plugins.jedi_references.enabled = true
config.pylsp.plugins.jedi_signature_help.enabled = true
config.pylsp.plugins.jedi_symbols.enabled = true

# JavaScript/TypeScript configuration
[[language]]
name = "javascript"
language-servers = ["typescript-language-server"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "typescript"
language-servers = ["typescript-language-server"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "tsx"
language-servers = ["typescript-language-server"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "jsx"
language-servers = ["typescript-language-server"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]
config.hostInfo = "helix"

# Go configuration (enhanced)
[[language]]
name = "go"
language-servers = ["gopls"]
auto-format = true
formatter = { command = "gofmt" }

[language-server.gopls]
command = "gopls"
config.hints.assignVariableTypes = true
config.hints.compositeLiteralFields = true
config.hints.compositeLiteralTypes = true
config.hints.constantValues = true
config.hints.functionTypeParameters = true
config.hints.parameterNames = true
config.hints.rangeVariableTypes = true
config.analyses.fieldalignment = true
config.analyses.nilness = true
config.analyses.unusedparams = true
config.analyses.unusedwrite = true
config.analyses.useany = true
config.staticcheck = true
config.gofumpt = true

# JSON configuration
[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }

# TOML configuration (for editing Helix config)
[[language]]
name = "toml"
auto-format = true

# Markdown configuration
[[language]]
name = "markdown"
formatter = { command = "prettier", args = ["--parser", "markdown"] }
