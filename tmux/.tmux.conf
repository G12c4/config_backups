# ============================================
# TPM Plugin Manager (install plugins with prefix + I)
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Persist sessions after restart
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto save/restore sessions
set -g @plugin 'tmux-plugins/tmux-yank'           # Copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-open'           # Open URLs/paths with prefix + o
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Show prefix mode in status

# ============================================
# General Settings
# ============================================
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on

# History
set -g history-limit 50000

# ============================================
# Key Bindings
# ============================================
# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation with Alt + arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resize with Alt + Shift + arrow
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# Quick window switch with Shift + Left/Right
bind -n S-Left previous-window
bind -n S-Right next-window

# Show cheat sheet
bind h send-keys "cat ~/.tmux-cheatsheet.txt" Enter

# ============================================
# Warm Sunset Color Theme (from WezTerm)
# ============================================
# Base colors
set -g mode-style "fg=#f2e9e1,bg=#286983"

# Default statusbar colors
set -g status-style "fg=#f2e9e1,bg=#1a110e"

# Default window title colors
set -g window-status-style "fg=#6a5a52,bg=#1a110e"
set -g window-status-format " #I:#W "

# Active window title colors
set -g window-status-current-style "fg=#f2e9e1,bg=#2d1f1a,bold"
set -g window-status-current-format " #I:#W "

# Window with activity
set -g window-status-activity-style "fg=#ea9d34,bg=#1a110e"

# Pane border colors
set -g pane-border-style "fg=#3d2a22"
set -g pane-active-border-style "fg=#ea9d34"

# Message colors
set -g message-style "fg=#f2e9e1,bg=#2d1f1a"
set -g message-command-style "fg=#f2e9e1,bg=#2d1f1a"

# Clock mode
set -g clock-mode-colour "#ea9d34"
set -g clock-mode-style 24

# Copy mode highlight
set -wg mode-style "fg=#f2e9e1,bg=#286983"

# ============================================
# Status Bar Layout
# ============================================
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 100

# Left side: prefix indicator + session name
set -g status-left "#{prefix_highlight} #[fg=#ea9d34,bold]#S #[fg=#3d2a22]│ "

# Right side: datetime + hostname + help hint
set -g status-right "#[fg=#6a5a52]%H:%M #[fg=#3d2a22]│ #[fg=#907aa9]%d %b #[fg=#3d2a22]│ #[fg=#56949f]#h #[fg=#3d2a22]│ #[fg=#ea9d34]Ctrl+b h help"

# Window status format (center)
set -g window-status-format "#[fg=#6a5a52]#I:#W"
set -g window-status-current-format "#[fg=#2d1f1a,bg=#ea9d34,nobold] #I:#W #[fg=#ea9d34,bg=#1a110e,nobold]"

# ============================================
# Continuum & Resurrect Settings
# ============================================
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'  # Don't auto-restore on start
set -g @continuum-save-interval '15'

# ============================================
# Prefix Highlight Settings
# ============================================
set -g @prefix_highlight_prefix '⌘'
set -g @prefix_highlight_copy_mode 'Copy'
set -g @prefix_highlight_sync_mode 'Sync'
set -g @prefix_highlight_fg '#1a110e'
set -g @prefix_highlight_bg '#ea9d34'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'

# ============================================
# Initialize TPM (keep this at the bottom)
# ============================================
run '~/.tmux/plugins/tpm/tpm'
